<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Your Daily Task Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="navbar-inner">
            <a href="#" class="logo">
                <span class="logo-icon">◆</span>
                <span class="logo-text">TaskFlow</span>
            </a>
            <nav class="nav-links">
                <a href="#hero">Home</a>
                <a href="#todo-section">Tasks</a>
            </nav>
            <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
                <span class="theme-icon sun" aria-hidden="true">☀</span>
                <span class="theme-icon moon" aria-hidden="true">☽</span>
            </button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero" id="hero">
        <div class="hero-content">
            <h1 class="hero-title">Get things done.<br><span class="hero-accent">Stay in flow.</span></h1>
            <p class="hero-subtitle">A simple, fast task manager that keeps your day on track. Add tasks below and watch your productivity soar.</p>
        </div>
    </section>

    <!-- To-Do Section -->
    <section class="todo-section" id="todo-section">
        <div class="todo-container">
            <div class="todo-header">
                <h2 class="todo-title">Your Tasks</h2>
                <div class="todo-input-wrap">
                    <input type="text" class="todo-input" id="todoInput" placeholder="Add a new task..." maxlength="200" autocomplete="off">
                    <button type="button" class="todo-add-btn" id="addTodoBtn" aria-label="Add task">Add</button>
                </div>
            </div>
            <ul class="todo-list" id="todoList" aria-label="Task list">
                <!-- Tasks are injected here by JavaScript -->
            </ul>
            <div class="todo-footer" id="todoFooter">
                <span class="todo-count" id="todoCount">0 tasks</span>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
